pre-commit:
  parallel: true
  jobs:
    - name: format
      glob: "*.{ts,tsx,js,jsx,css,json}"
      run: pnpm oxfmt --check {staged_files}
    - name: lint
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm oxlint {staged_files}
    - name: pinact
      glob: ".github/{workflows,actions}/**/*.{yml,yaml}"
      run: pinact run -u --check --min-age 7
    - name: ghalint
      glob: ".github/{workflows,actions}/**/*.{yml,yaml}"
      run: ghalint run
    - name: actionlint
      glob: ".github/{workflows,actions}/**/*.{yml,yaml}"
      run: actionlint
